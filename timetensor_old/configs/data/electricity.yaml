dataset: electricity
path: ../datasets/electricity/
context_cols:
normalize: False
aggregation:

splits:
  indiv_split: 1
  date_splits: 0.6;0.4
  drop_users: 57;106;127;182;298;6;113;143
  reshuffle: True #to redraw splits
  clusters: #Name of cluster folder

sampling:
  train_len_multiplier: 1
  eval_len_multiplier: 1
  train_idx_mode: individuals
  eval_idx_mode: all
  shuffle_train: True
  shuffle_eval: True
  train_stride: 1
  eval_stride: 1
  train_block_individuals: 1
  eval_block_individuals: 1
  remove_train_cte: True
  remove_eval_cte: True
  use_context: False
  context_by_individuals: False
  
subsets:
  mode: dates
  sizes:
    train: 1
    valid1: 1
    valid2: 1
    valid3: 1
    test1: 1
    test2: 1
  cluster: #Name of cluster within cluster folder (.pt file)